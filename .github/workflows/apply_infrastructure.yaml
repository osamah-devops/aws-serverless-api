name: Apply Infrastructure with Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::072754096540:role/aws-serverless-api
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init

      - name: Download plan from S3
        run: |
          aws s3 cp \
            s3://my-terraform-state-bucket-aws-serverless-api/plans/${{ github.sha }}.tfplan \
            infrastructure/tfplan

      - name: Terraform Apply
        working-directory: ./infrastructure
        run: terraform apply -input=false infrastructure/tfplan

      - name: Delete plan from S3 (cleanup)
        if: always()
        run: |
          aws s3 rm \
            s3://my-terraform-state-bucket-aws-serverless-api/plans/${{ github.sha }}.tfplan