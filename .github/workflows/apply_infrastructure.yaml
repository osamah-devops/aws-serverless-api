name: Apply Infrastructure with Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - '.github/workflows/plan_infrastructure.yaml'
      - '.github/workflows/apply_infrastructure.yaml'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.0

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::072754096540:role/aws-serverless-api
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init

      - name: Resolve latest uploaded plan key
        id: latest_plan
        shell: bash
        run: |
          set -euo pipefail
          PLAN_KEY=$(aws s3api list-objects-v2 \
            --bucket my-terraform-state-bucket-aws-serverless-api \
            --prefix plans/ \
            --query "sort_by(Contents, &LastModified)[-1].Key" \
            --output text)

          if [ -z "$PLAN_KEY" ] || [ "$PLAN_KEY" = "None" ]; then
            echo "No plan files found under s3://my-terraform-state-bucket-aws-serverless-api/plans/"
            exit 1
          fi

          echo "Using latest plan: $PLAN_KEY"
          echo "key=$PLAN_KEY" >> "$GITHUB_OUTPUT"

      - name: Download plan from S3
        run: |
          aws s3 cp \
            s3://my-terraform-state-bucket-aws-serverless-api/${{ steps.latest_plan.outputs.key }} \
            infrastructure/tfplan

      - name: Terraform Apply
        working-directory: ./infrastructure
        run: terraform apply -input=false tfplan

      - name: Delete plan from S3 (cleanup)
        if: always()
        run: |
          aws s3 rm \
            s3://my-terraform-state-bucket-aws-serverless-api/${{ steps.latest_plan.outputs.key }}