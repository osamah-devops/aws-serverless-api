name: Plan Infrastructure 
on: 
    pull_request:
        branches: 
            - main
        paths:
            - 'infrastructure/**'
            - '.github/workflows/plan_infrastructure.yaml'
            - '.github/workflows/apply_infrastructure.yaml'
permissions:
  id-token: write
  contents: read
jobs:
    plan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: 1.15.0

            - name: Configure AWS OIDC
              uses: aws-actions/configure-aws-credentials@v6
              with:
                role-to-assume: arn:aws:iam::072754096540:role/aws-serverless-api
                aws-region: us-east-1    
            - name: Terraform Init
              run: terraform init
              working-directory: ./infrastructure
            
            - name: Terraform fmt
              run: terraform fmt --recursive
              working-directory: ./infrastructure
            
            - name: Terraform Validate
              run: terraform validate
              working-directory: ./infrastructure
            
            - name: Terraform Plan
              run: terraform plan -out=tfplan -input=false
              working-directory: ./infrastructure
            
            - name: Upload plan to S3
              run: |
                aws s3 cp infrastructure/tfplan \
                  s3://my-terraform-state-bucket-aws-serverless-api/plans/${{ github.sha }}.tfplan